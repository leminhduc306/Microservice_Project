version: "3.8"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: mpm-handover-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - mpm-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: mpm-handover-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: mpm-handover-zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - mpm-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui-mpm-handover-10
    depends_on:
      - kafka
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: mpm-handover
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: mpm-handover-kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: mpm-handover-zookeeper:2181
    networks:
      - mpm-network

  mysql-db:
    image: mysql:8.0
    container_name: mysqldb
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mpm-network

  redis:
    image: redis:7.0-alpine
    container_name: mpm-handover-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - mpm-network

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight-ui
    ports:
      - "5540:5540"
    volumes:
      - redis_insight_data:/data
    depends_on:
      - redis
    networks:
      - mpm-network

volumes:
  mysql_data:
  redis_data:
  redis_insight_data:

networks:
  mpm-network:
    driver: bridge